<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG TV MAX - Philips Lite</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Контейнер за плеъра - фиксиран най-горе */
        .player-container { position: sticky; top: 0; background: #050505; padding-bottom: 15px; z-index: 100; border-bottom: 1px solid #222; }
        video { width: 100%; max-width: 800px; aspect-ratio: 16/9; display: block; margin: 0 auto; background: #000; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        
        /* Статус съобщение */
        #status { text-align: center; font-size: 14px; margin: 10px 0; color: #00ff00; height: 20px; }

        /* Списък с канали */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 10px; max-width: 1000px; margin: 0 auto; }
        
        button { 
            background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 15px 5px; font-size: 15px; 
            cursor: pointer; border-radius: 6px; outline: none; transition: all 0.2s;
            -webkit-user-select: none; user-select: none;
        }

        /* Ефект при избор с дистанционно */
        button:focus { 
            background: #0056b3; 
            color: #fff; 
            border-color: #fff; 
            transform: scale(1.08); 
            box-shadow: 0 0 15px #0056b3; 
            z-index: 10;
        }

        button:active { background: #ff0055; }

        .category { width: 100%; text-align: center; color: #555; font-size: 12px; margin-top: 20px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="video" controls autoplay playsinline></video>
        <div id="status">Изберете канал</div>
    </div>

    <div class="grid" id="channel-grid">
        </div>

    <script>
        // Прокси за заобикаляне на CORS защити
        const proxy = "https://corsproxy.io/?";

        const channels = [
            // НАЦИОНАЛНИ
            { name: "БНТ 1", url: "https://bntlive-cn.cdn.bg/live/color/bnt1/playlist.m3u8", useProxy: false },
            { name: "БНТ 2", url: "https://bntlive-cn.cdn.bg/live/color/bnt2/playlist.m3u8", useProxy: false },
            { name: "БНТ 3 HD", url: "https://bntlive-cn.cdn.bg/live/color/bnt3/playlist.m3u8", useProxy: false },
            { name: "БНТ 4", url: "https://bntlive-cn.cdn.bg/live/color/bnt4/playlist.m3u8", useProxy: false },
            { name: "Bulgaria ON AIR", url: "https://lb-hls.cdn.bg/2006/fls/bonair.stream/playlist.m3u8", useProxy: false },
            { name: "Nova TV", url: "https://195.24.51.58/hls/nova_live.m3u8", useProxy: true },
            { name: "bTV", url: "https://itv.bg/live/btv/playlist.m3u8", useProxy: true },
            
            // МУЗИКА
            { name: "The Voice", url: "https://bss1.neterra.tv/thevoice/stream_0.m3u8", useProxy: true },
            { name: "Magic TV", url: "https://bss1.neterra.tv/magictv/stream_0.m3u8", useProxy: true },
            { name: "City TV", url: "https://tv.city.bg/play/tshls/citytv/2.m3u8", useProxy: false },
            { name: "FEN TV", url: "http://84.22.46.188/play/a00y", useProxy: false },
            { name: "Balkanika", url: "http://84.22.46.188/play/a00x", useProxy: false },
            { name: "Planeta Folk", url: "http://84.22.46.188/play/a00l", useProxy: false },
            
            // НОВИНИ И РЕГИОНАЛНИ
            { name: "Bloomberg BG", url: "https://p.cdn.bg/liven/bloomberg/index.m3u8", useProxy: false },
            { name: "TV1 HD", url: "https://tv1.bg/hls/tv1_1080.m3u8", useProxy: false },
            { name: "Evrokom", url: "http://93.155.230.12:8081/hls/live.m3u8", useProxy: false },
            { name: "Agro TV", url: "https://p.cdn.bg/liven/agrotv/index.m3u8", useProxy: false },
            { name: "Destination BG", url: "https://p.cdn.bg/liven/destbg/index.m3u8", useProxy: false }
        ];

        const video = document.getElementById('video');
        const grid = document.getElementById('channel-grid');
        const status = document.getElementById('status');
        let hls = new Hls();

        function play(url, name, useProxy) {
            status.style.color = "#00ff00";
            status.innerText = "Зареждане: " + name;

            // Ако каналът изисква прокси, го добавяме
            const finalUrl = useProxy ? proxy + encodeURIComponent(url) : url;

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true
                });
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    status.innerText = "В момента гледате: " + name;
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        status.style.color = "#ff0000";
                        status.innerText = "Грешка: Каналът не е достъпен";
                        console.error("HLS Error:", data);
                    }
                });
            } 
            // За браузъри с нативна поддръжка (някои Philips/Safari)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = finalUrl;
                video.play();
            }
        }

        // Генериране на бутони
        channels.forEach(ch => {
            const btn = document.createElement('button');
            btn.innerText = ch.name;
            // Поддръжка за мишка и дистанционно
            btn.onclick = () => play(ch.url, ch.name, ch.useProxy);
            
            // Важно за дистанционното: реагиране на OK/Enter
            btn.onkeydown = (e) => {
                if (e.keyCode === 13 || e.key === "Enter") {
                    play(ch.url, ch.name, ch.useProxy);
                }
            };
            
            grid.appendChild(btn);
        });

        // Автоматично стартиране на БНТ 1
        window.onload = () => {
            play(channels[0].url, channels[0].name, channels[0].useProxy);
        };
    </script>
</body>
</html>
