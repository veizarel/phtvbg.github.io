<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>BG TV - Philips Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .vid-container { position: sticky; top: 0; background: #000; padding: 10px 0; border-bottom: 3px solid #333; }
        video { width: 95%; max-width: 700px; background: #111; aspect-ratio: 16/9; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; }
        button { 
            background: #222; border: 2px solid #444; color: #fff; padding: 12px; 
            min-width: 120px; font-size: 14px; border-radius: 5px; cursor: pointer;
        }
        button:focus { background: #ff0055; border-color: #fff; outline: none; transform: scale(1.1); }
        #log { font-size: 12px; color: #666; margin: 5px; }
    </style>
</head>
<body>

<div class="vid-container">
    <video id="video" controls autoplay></video>
    <div id="log">Изберете канал</div>
</div>

<div class="grid">
    <button onclick="p('http://bntlive-cn.cdn.bg/live/color/bnt1/playlist.m3u8', 'БНТ 1')">БНТ 1</button>
    <button onclick="p('http://bntlive-cn.cdn.bg/live/color/bnt2/playlist.m3u8', 'БНТ 2')">БНТ 2</button>
    <button onclick="p('http://bntlive-cn.cdn.bg/live/color/bnt3/playlist.m3u8', 'БНТ 3')">БНТ 3</button>
    
    <button onclick="p('http://195.24.51.58/hls/nova_live.m3u8', 'NOVA')">NOVA</button>
    <button onclick="p('http://lb-hls.cdn.bg/2006/fls/bonair.stream/playlist.m3u8', 'On Air')">On Air</button>
    <button onclick="p('http://84.22.46.188/play/a00i', 'The Voice')">The Voice</button>
    <button onclick="p('http://84.22.46.188/play/a00j', 'Magic TV')">Magic TV</button>
    <button onclick="p('http://tv.city.bg/play/tshls/citytv/2.m3u8', 'City TV')">City TV</button>
    <button onclick="p('http://84.22.46.188/play/a00y', 'FEN TV')">FEN TV</button>
    <button onclick="p('http://93.155.230.12:8081/hls/live.m3u8', 'Evrokom')">Евроком</button>
    <button onclick="p('http://84.22.46.188/play/a00l', 'Planeta Folk')">Planeta</button>
</div>

<script>
    var v = document.getElementById('video');
    var l = document.getElementById('log');
    var h = null;

    function p(u, n) {
        l.innerText = "Зареждане: " + n;
        if (h) { h.destroy(); }
        
        if (Hls.isSupported()) {
            h = new Hls({
                // Philips Fix: ограничаваме заявките, за да не претоварим ТВ-то
                manifestLoadingMaxRetry: 2,
                xhrSetup: function(xhr) {
                    // Опит за премахване на заглавията, които дразнят сървърите
                    xhr.withCredentials = false;
                }
            });
            h.loadSource(u);
            h.attachMedia(v);
            h.on(Hls.Events.MANIFEST_PARSED, function() {
                v.play();
                l.innerText = "Гледате: " + n;
            });
            h.on(Hls.Events.ERROR, function(e, d) {
                if (d.fatal) { l.innerText = "Грешка: " + n; }
            });
        } else {
            v.src = u;
            v.play();
        }
    }

    // Авто-старт със City TV (щом той работи, да имаме картина веднага)
    window.onload = function() { p('http://tv.city.bg/play/tshls/citytv/2.m3u8', 'City TV'); };
</script>

</body>
</html>
