<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>Philips BG TV - Power Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .player-box { position: sticky; top: 0; background: #050505; padding: 10px 0; border-bottom: 2px solid #222; z-index: 100; }
        video { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; }
        #status { font-size: 14px; margin: 10px 0; color: #00ff00; height: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; max-width: 1000px; margin: 0 auto; }
        button { 
            background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 15px 5px; font-size: 15px; 
            cursor: pointer; border-radius: 5px; outline: none; transition: 0.2s;
        }
        button:focus { background: #0056b3; border-color: #fff; transform: scale(1.08); box-shadow: 0 0 15px #0056b3; }
    </style>
</head>
<body>

    <div class="player-box">
        <video id="video" controls autoplay playsinline></video>
        <div id="status">Изберете канал</div>
    </div>

    <div class="grid" id="channel-grid"></div>

    <script>
        const base = "http://78.83.191.18:8000/play/";
        
        // Канали, извлечени директно от твоя списък 
        const channels = [
            { name: "bTV HD", id: "a06u" }, [cite: 5]
            { name: "Nova HD", id: "a06v" }, [cite: 3]
            { name: "Diema Sport 2 HD", id: "a077" }, [cite: 2]
            { name: "MAX Sport 1 HD", id: "a073" }, [cite: 3]
            { name: "MAX Sport 2 HD", id: "a074" }, [cite: 3]
            { name: "bTV Action HD", id: "a06t" }, [cite: 5]
            { name: "BNT 1", id: "a046" }, [cite: 1]
            { name: "BNT 2", id: "a049" }, [cite: 1]
            { name: "BNT 3", id: "a03x" }, [cite: 1]
            { name: "Nova News", id: "a05e" }, [cite: 3]
            { name: "Diema", id: "a045" }, [cite: 2]
            { name: "KinoNova", id: "a041" }, [cite: 3]
            { name: "FOX Life", id: "a04f" }, [cite: 3]
            { name: "Disney Channel", id: "a059" }, [cite: 2]
            { name: "Discovery", id: "a044" }, [cite: 2]
            { name: "National Geographic", id: "a048" }, [cite: 4]
            { name: "The Voice", id: "a043" }, [cite: 4]
            { name: "City TV", id: "a06c" }, [cite: 1]
            { name: "MagicTV", id: "a03u" }, [cite: 3]
            { name: "Planeta HD", id: "a03m" }, [cite: 4]
            { name: "Balkanika", id: "a05h" } [cite: 1]
        ];

        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const grid = document.getElementById('channel-grid');
        let hls = new Hls();

        function play(id, name) {
            const url = base + id;
            status.innerText = "Зареждане: " + name;
            
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    status.innerText = "В момента гледате: " + name;
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        channels.forEach(ch => {
            const btn = document.createElement('button');
            btn.innerText = ch.name;
            btn.onclick = () => play(ch.id, ch.name);
            btn.onkeydown = (e) => { if(e.keyCode === 13) play(ch.id, ch.name); };
            grid.appendChild(btn);
        });

        // Стартираме с bTV HD по подразбиране [cite: 5]
        window.onload = () => play(channels[0].id, channels[0].name);
    </script>
</body>
</html>
