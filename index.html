<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BG TV Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; text-align: center; }
        .header { position: sticky; top: 0; background: #000; padding: 10px; border-bottom: 2px solid #333; z-index: 999; }
        video { width: 100%; max-width: 640px; background: #111; aspect-ratio: 16/9; }
        .button-container { padding: 20px; display: block; }
        button { 
            background: #222; color: #fff; border: 1px solid #444; 
            padding: 15px; margin: 5px; width: 140px; 
            font-size: 14px; cursor: pointer; border-radius: 5px;
        }
        button:focus { background: #0066ff; outline: 3px solid #fff; }
        #status { color: #0f0; margin: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <video id="video" controls autoplay></video>
    <div id="status">Изберете канал от списъка долу:</div>
</div>

<div class="button-container">
    <button onclick="play('https://tv.city.bg/play/tshls/citytv/2.m3u8', 'City TV')">City TV</button>
    <button onclick="play('https://bss1.neterra.tv/thevoice/stream_0.m3u8', 'The Voice')">The Voice</button>
    <button onclick="play('https://bss1.neterra.tv/magictv/stream_0.m3u8', 'Magic TV')">Magic TV</button>
    <button onclick="play('https://bntlive-cn.cdn.bg/live/color/bnt1/playlist.m3u8', 'БНТ 1')">БНТ 1</button>
    <button onclick="play('https://bntlive-cn.cdn.bg/live/color/bnt2/playlist.m3u8', 'БНТ 2')">БНТ 2</button>
    <button onclick="play('https://bntlive-cn.cdn.bg/live/color/bnt3/playlist.m3u8', 'БНТ 3')">БНТ 3</button>
    <button onclick="play('https://lb-hls.cdn.bg/2006/fls/bonair.stream/playlist.m3u8', 'On Air')">Bulgaria On Air</button>
    <button onclick="play('https://tv1.bg/hls/tv1_1080.m3u8', 'TV1 HD')">TV1 HD</button>
    <button onclick="play('http://93.155.230.12:8081/hls/live.m3u8', 'Евроком')">Евроком</button>
</div>

<script>
    var video = document.getElementById('video');
    var statusTxt = document.getElementById('status');
    var hls = null;

    function play(url, name) {
        statusTxt.innerText = "Зареждане: " + name;
        if (hls) { hls.destroy(); }

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
                statusTxt.innerText = "Гледате: " + name;
            });
            hls.on(Hls.Events.ERROR, function() {
                statusTxt.innerText = "Грешка: " + name;
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }

    // Авто-старт при зареждане
    window.onload = function() {
        play('https://tv.city.bg/play/tshls/citytv/2.m3u8', 'City TV');
    };
</script>

</body>
</html>
